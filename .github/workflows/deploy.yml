name: Deploy portfoli react app
on:
  push:
    branches: ["main"]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v3
      - name: Build Image
        run: docker build -t ${{secrets.DOCKER_USERNAME}}/portfolio-react-app .
      - name: login to docker
        run: echo "${{secrets.DOCKER_PASSWORD}}" | docker login -u ${{secrets.DOCKER_USERNAME}} --password-stdin
      - name: push image on docker hub
        run: docker push ${{secrets.DOCKER_USERNAME}}/portfolio-react-app
      - name: deploy to EC2
        run: |
          echo "${{secrets.EC2_SSH_KEY}}" > key.pem
          chmod 600 key.pem
          ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@${{secrets.EC2_IP}} << 'EOF'
          docker pull ${{secrets.DOCKER_USERNAME}}/portfolio-react-app &&
          docker stop app || true
          docker rm app || true
          docker run -d -p 80:80 --name app ${{secrets.DOCKER_USERNAME}}/portfolio-react-app
          EOF
